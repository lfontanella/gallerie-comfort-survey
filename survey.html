<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Visitor Comfort Survey – Gallerie dell’Accademia di Venezia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #f6f2ea;
      --text: #3b3b3b;
      --muted: #5a5a5a;
      --green: #6e9371;
      --green2:#58815c;
      --card: rgba(255,255,255,0.55);
      --border: rgba(59,59,59,0.18);
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
      --radius: 28px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:'Open Sans', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(circle at 30% 0%, #fff 0%, var(--bg) 55%, #efe9dd 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
    }
    .screen{
      width: min(520px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.35));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(59,59,59,0.12);
      gap:12px;
    }
    .topbar .left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 0;
    }
    .topbar img{ width: 40px; height:auto; }
    .topbar .title{
      font-weight:600;
      line-height:1.1;
      font-size: 14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 320px;
    }
    .actions{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .btn{
      appearance:none;
      border: 1px solid rgba(59,59,59,0.18);
      background: rgba(255,255,255,0.55);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      font-weight:600;
      font-size: 13px;
      cursor:pointer;
      text-decoration:none;
      white-space:nowrap;
    }
    .btn.primary{
      background: var(--green);
      color:#fff;
      border-color: transparent;
    }
    .btn.primary:hover{ background: var(--green2); }

    .frame-wrap{
      height: min(78vh, 820px);
      background: transparent;
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      background: transparent;
    }

    .hint{
      padding: 10px 14px 14px;
      color: var(--muted);
      font-size: 12px;
      line-height:1.35;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="left">
        <img src="logo.png" alt="Gallerie dell'Accademia di Venezia logo">
        <div class="title">Visitor Comfort Survey</div>
      </div>

      <div class="actions">
        <a class="btn" href="index.html">Back</a>
        <a class="btn primary"
           href="https://docs.google.com/forms/d/e/1FAIpQLSduSndjH9S-TDi1e_xAKgjSVC7QYzuHX_Naj7oAezNNZdszTQ/viewform?usp=sf_link"
           target="_blank" rel="noopener">
          Open full screen
        </a>
      </div>
    </div>

    <div class="frame-wrap">
      <iframe
        title="Google Form – Visitor Comfort Survey"
        loading="lazy"
        src="https://docs.google.com/forms/d/e/1FAIpQLSduSndjH9S-TDi1e_xAKgjSVC7QYzuHX_Naj7oAezNNZdszTQ/viewform?embedded=true">
      </iframe>
    </div>

    <div class="hint">
      If the embedded form does not load (e.g., on restricted networks), use “Open full screen”.
    </div>
  </div>
</body>
</html>
